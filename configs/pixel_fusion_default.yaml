pixel_fusion_enabled: true # true enables ERP pixel fusion; false preserves the original latent write-back path.
random_seed: 1 # null preserves the caller/global RNG state; set any nonnegative integer for deterministic initial latents and stochastic VAE sampling.
pixel_fusion_every_n_steps: 1 # Integer >= 1; run fusion every N denoising steps while inside the ratio window.
pixel_fusion_start_ratio: 0.0 # Float from 0.0 to 1.0; first normalized denoising-step ratio eligible for fusion.
pixel_fusion_end_ratio: 1.0 # Float from 0.0 to 1.0; last normalized denoising-step ratio eligible for fusion.

warp_mode: lpw # Options: standard or lpw (Laplacian-pyramid warping).
aggregation_mode: detail_preserving_average # Options: average, weighted_average, or detail_preserving_average.
weight_mode: distance_to_boundary # Options: uniform, cosine, gaussian, or distance_to_boundary; ignored by average.

lpw_num_levels: 4 # Integer >= 1; number of Gaussian/Laplacian levels used when warp_mode is lpw.
lpw_lod_mode: jacobian # Options: jacobian for projection-derived LOD or none to force zero LOD.
lpw_lod_interpolation: nearest # Options: linear or nearest; controls LOD-to-pyramid-level confidence.
erp_vertical_padding_mode: reflect # Options: reflect or replicate for perspective-patch pyramids; ERP filtering always uses circular longitude and pole-aware reflection.
erp_to_perspective_interpolation_mode: nearest # Options: bilinear or nearest; controls fused ERP RGB and validity-mask sampling back into perspective views.

dpa_alpha: 1.0 # Float, normally 0.0 to 1.0; 0 is weighted average and 1 applies full DPA detail correction.
dpa_power: 1.0 # Nonnegative float; controls how strongly coefficient magnitude influences DPA detail weights.
dpa_eps: 1.0e-6 # Positive float; numerical floor for DPA, masks, normalization, and invalid-coverage checks.

reinjection_mode: noise_consistent # Options: noise_consistent, replace, weighted_replace, or residual.
reinjection_strength: 1.0 # Float, normally 0.0 to 1.0; 0 keeps the original update and 1 applies the full fused update.
spherical_writeback_mode: exclusive # Options: weighted_average preserves SphereDiff accumulation; exclusive writes each spherical point from one owner patch.
spherical_owner_mode: max_center_weight # Supported option: max_center_weight; equal scores are resolved by the lowest stable patch ID.
exclusive_owner_map_static: true # true caches ownership while the full geometry signature matches; false rebuilds it every fusion timestep.
exclusive_uncovered_mode: error # Options: error, or weighted_average_fallback for uncovered points only.
save_owner_map: false # true saves owner IDs, scores, coverage/write counts, and the owner histogram; false disables owner-map file/console diagnostics while retaining the runtime assertion.

time_travel_enabled: false # Must remain false: true currently raises NotImplementedError because time travel is not wired.
time_travel_every_n_steps: 1 # Integer >= 1 reserved for time travel; inactive while time_travel_enabled is false.
time_travel_jump_length: 1 # Positive integer reserved for the number of scheduler steps jumped backward.
time_travel_num_repeats: 1 # Positive integer reserved for repeated denoising passes after each jump.
time_travel_strength: 1.0 # Float reserved for scheduler-consistent renoising strength; currently inactive.

vae_chunk_size: 8 # Integer >= 1; views per VAE encode/decode chunk, lowered to reduce peak GPU memory.
save_intermediates: false # true includes the fused ERP tensor in diagnostic output; false omits it.
save_masks: false # true saves validity, contributor-count, accumulated-weight, and overlap masks.
save_diagnostics: false # true saves masks, camera directions, latent delta norm, and stage timings.
measure_performance: false # true uses CUDA synchronization for accurate timings but adds runtime overhead.
diagnostics_dir: null # null disables diagnostic file writing; otherwise provide an absolute or repo-relative directory path.

projection_chunk_size: 1 # Integer >= 1; number of same-sized views projected per ERP accumulation chunk.
vae_sample_posterior: false # false uses deterministic posterior mean/mode; true samples the VAE posterior when available.

